version: '3.8'

services:
  metrics-exporter:
    build: .
    container_name: metrics-exporter
    ports:
      - "9500:9500"
    volumes:
      # Mount host /proc to /host/proc for disk and NFS stats
      - /proc:/host/proc:ro
    environment:
      - PORT=9500
      - DISKSTATS_PATH=/host/proc/diskstats
      - MOUNTSTATS_PATH=/host/proc/self/mountstats
    privileged: true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9500/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
