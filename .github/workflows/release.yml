name: Release

on:
  push:
    branches: ["main"]

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      tag_exists: ${{ steps.check_tag.outputs.exists }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read VERSION file
        id: version
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT

      - name: Check if tag already exists
        id: check_tag
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create and push tag
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.version.outputs.version }}" -m "Release v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

  docker-image:
    needs: prepare
    if: needs.prepare.outputs.tag_exists == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/crusoe-metrics-exporter:${{ needs.prepare.outputs.version }}
            ghcr.io/${{ github.repository }}/crusoe-metrics-exporter:latest

  binary-tarball:
    needs: prepare
    if: needs.prepare.outputs.tag_exists == 'false'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Install clang/libbpf for eBPF cross-compile
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libbpf-dev linux-libc-dev

      - name: Compile eBPF objects for ${{ matrix.arch }}
        run: |
          mkdir -p src/collectors/ebpf
          # compile.sh emits <name>.o (no arch suffix) when a single --arch is given
          ./ebpf/compile.sh --arch ${{ matrix.arch }} --outdir src/collectors/ebpf

      - name: Build Go binary for linux/${{ matrix.arch }}
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
        run: |
          mkdir -p build/dist
          go build -a -installsuffix cgo \
            -ldflags "-s -w -X main.version=${{ needs.prepare.outputs.version }}" \
            -o build/dist/crusoe-metrics-exporter ./src

      - name: Stage tarball contents
        run: |
          STAGE="crusoe-metrics-exporter-${{ needs.prepare.outputs.version }}-linux-${{ matrix.arch }}"
          mkdir -p "$STAGE"
          cp build/dist/crusoe-metrics-exporter "$STAGE/"
          cp systemd/crusoe-metrics-exporter.service "$STAGE/"
          cp LICENSE "$STAGE/"
          cp VERSION "$STAGE/"
          cp README.md "$STAGE/"
          # Minimal install helper for end users / installer scripts
          cat > "$STAGE/install.sh" <<'EOF'
          #!/bin/sh
          # Install the crusoe-metrics-exporter binary and systemd unit.
          # Run from the unpacked tarball directory as root.
          set -eu
          DEST_BIN="${DEST_BIN:-/usr/local/bin/crusoe-metrics-exporter}"
          DEST_UNIT="${DEST_UNIT:-/etc/systemd/system/crusoe-metrics-exporter.service}"
          install -m 0755 crusoe-metrics-exporter "$DEST_BIN"
          install -m 0644 crusoe-metrics-exporter.service "$DEST_UNIT"
          systemctl daemon-reload
          echo "Installed $DEST_BIN and $DEST_UNIT"
          echo "Enable with: systemctl enable --now crusoe-metrics-exporter.service"
          EOF
          chmod +x "$STAGE/install.sh"
          echo "STAGE=$STAGE" >> $GITHUB_ENV

      - name: Create tarball + checksum
        run: |
          tar -czf "${STAGE}.tar.gz" "$STAGE"
          sha256sum "${STAGE}.tar.gz" > "${STAGE}.tar.gz.sha256"

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: crusoe-metrics-exporter-linux-${{ matrix.arch }}
          path: |
            crusoe-metrics-exporter-*-linux-${{ matrix.arch }}.tar.gz
            crusoe-metrics-exporter-*-linux-${{ matrix.arch }}.tar.gz.sha256
          retention-days: 7

  github-release:
    needs: [prepare, docker-image, binary-tarball]
    if: needs.prepare.outputs.tag_exists == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all tarball artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: crusoe-metrics-exporter-linux-*
          merge-multiple: true

      - name: Aggregate checksums
        working-directory: dist
        run: |
          cat *.tar.gz.sha256 > SHA256SUMS
          rm -f *.tar.gz.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS
